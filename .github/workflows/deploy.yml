name: Deploy

on:
  workflow_dispatch:
    inputs:
      seed:
        description: "Seed the database after deploy (⚠️ clears existing votes)"
        type: boolean
        default: false
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          secrets: |
            SEED_SECRET
        env:
          SEED_SECRET: ${{ secrets.SEED_SECRET }}

  seed:
    name: Seed Database
    needs: deploy
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.seed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Seed production database
        env:
          SEED_SECRET: ${{ secrets.SEED_SECRET }}
          WORKER_URL: ${{ vars.WORKER_URL }}
        run: |
          if [ -z "$WORKER_URL" ]; then
            echo "::error::WORKER_URL variable is not set. Add it in repo Settings → Variables → Actions."
            exit 1
          fi

          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${SEED_SECRET}" \
            "${WORKER_URL}/api/seed")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')

          echo "Response: $body"
          echo "HTTP Status: $http_code"

          if [ "$http_code" != "200" ]; then
            echo "::error::Seed failed with HTTP $http_code"
            exit 1
          fi

          echo "✅ Database seeded successfully!"
